name: Backend Deploy

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      # 3️⃣ Install deps & build
      - name: Install & Build Backend
        run: |
          cd backend
          npm ci
          npm run build

      # 4️⃣ Prepare production bundle
      - name: Prepare production bundle
        run: |
          cd backend
          rm -rf deploy
          mkdir deploy

          cp -r build deploy/
          cp package.json package-lock.json deploy/

      # 5️⃣ Upload build to server
      - name: Upload backend build
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "backend/deploy/"
          target: "/var/www/insyrge/backend"
          strip_components: 1

      # 6️⃣ Deploy & Restart with PM2
      - name: Deploy and Restart Backend
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e

            echo "📂 Moving to backend directory"
            cd /var/www/insyrge/backend

            echo "🧹 Cleaning old deploy"
            rm -rf deploy

            echo "📦 Renaming uploaded folder"
            mv backend/deploy ./deploy 2>/dev/null || true

            cd deploy

            echo "📦 Installing production dependencies"
            npm install --omit=dev

            echo "🚀 Restarting backend with PM2"

            pm2 describe backend > /dev/null \
              && pm2 restart backend \
              || pm2 start build/src/config/server.js \
                   --name backend \
                   --max-memory-restart 300M \
                   --time

            pm2 save

            echo "✅ Backend deployed successfully"
