name: Backend Deploy

on:
  push:
    paths:
      - "backend/**"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout
      - uses: actions/checkout@v4

      # 2️⃣ Node setup
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3️⃣ Install & Build
      - name: Build Backend
        run: |
          cd backend
          npm ci
          npm run build

      # 4️⃣ Prepare bundle
      - name: Prepare production bundle
        run: |
          cd backend
          rm -rf deploy
          mkdir deploy
          cp -r build deploy/
          cp package.json package-lock.json deploy/

      # 5️⃣ Upload
      - name: Upload backend build
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "backend/deploy"
          target: "/var/www/insyrge/backend"
          strip_components: 2

      # 6️⃣ Deploy on server
      - name: Restart backend with PM2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /var/www/insyrge/backend

            echo "🧹 Cleaning old files"
            rm -rf node_modules

            echo "📦 Installing production dependencies"
            npm ci --omit=dev

            echo "🚀 Starting/Restarting backend"

            pm2 describe insyrge-backend > /dev/null
            if [ $? -eq 0 ]; then
              pm2 restart insyrge-backend
            else
              pm2 start build/src/config/server.js --name insyrge-backend --time
            fi

            pm2 save

            echo "✅ Backend deployed successfully"
