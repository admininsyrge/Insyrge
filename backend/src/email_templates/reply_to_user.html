<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Message</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #f0f4f8;
      font-family: 'Open Sans', sans-serif;
    }

    .email-wrapper {
      width: 100%;
      padding: 20px 0;
      background-color: #f0f4f8;
    }

    .email-container {
      max-width: 600px;
      margin: auto;
      background-color: #ffffff;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
    }

    .email-header {
      background: linear-gradient(90deg, #8e2de2, #4a00e0);
      color: #fff;
      padding: 40px 20px;
      text-align: center;
    }

    .email-header h1 {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      font-size: 26px;
      font-weight: 600;
    }

    .email-body {
      padding: 40px 25px;
      color: #333;
      font-size: 16px;
      line-height: 1.6;
      text-align: center;
    }

    .email-body p {
      margin: 0;
      white-space: pre-line;
    }

    .email-footer {
      padding: 20px;
      background-color: #f8f9fa;
      font-size: 12px;
      color: #888;
      text-align: center;
      border-top: 1px solid #eee;
    }

    .email-footer a {
      color: #8e2de2;
      text-decoration: none;
    }

    @media only screen and (max-width: 600px) {
      .email-body {
        padding: 25px 15px;
      }

      .email-header {
        padding: 30px 15px;
      }
    }
  </style>
</head>

<body>
  <div class="email-wrapper">
    <div class="email-container">

      <!-- Header -->
      <div class="email-header">
        <h1>Hello, %FULL_NAME%</h1>
      </div>

      <!-- Body -->
      <div class="email-body">
        <p>%MESSAGE%</p>
      </div>

      <!-- Footer -->
      <div class="email-footer">
        <p>© 2025 Julien.js — All rights reserved.</p>
        <p>
          <a href="#">Privacy Policy</a>
        </p>
      </div>

    </div>
  </div>
</body>

</html>
