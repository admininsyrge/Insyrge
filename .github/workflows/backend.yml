name: Backend Deploy

on:
  push:
    paths:
      - "backend/**"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3️⃣ Install deps & build (CI ONLY)
      - name: Install & Build Backend
        run: |
          cd backend
          node --version
          npm ci
          npm run build

      # 4️⃣ Prepare production package (ONLY REQUIRED FILES)
      - name: Prepare production bundle
        run: |
          cd backend
          rm -rf deploy
          mkdir deploy
          cp -r build deploy/
          cp package.json package-lock.json deploy/

      # 5️⃣ Upload build to server
      - name: Upload backend build
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "backend/deploy/*"
          target: "/var/www/backend"
          strip_components: 0

      # 6️⃣ Install prod deps & restart PM2
      - name: Restart backend with PM2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /var/www/backend

            echo "📦 Installing production dependencies"
            npm ci --omit=dev

            echo "♻️ Restarting backend"
            pm2 delete backend || true

            pm2 start build/config/server.js \
              --name backend \
              --max-memory-restart 300M \
              --time

            pm2 save

            echo "✅ Backend deployed successfully"
